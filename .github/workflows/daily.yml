name: Daily Contribution

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "Last updated: $(date)" > timestamp.txt

      - name: Commit changes
        run: |
          git config --global user.name "Pooja Jain"
          git config --global user.email "pooja.jain06092005@gmail.com"
          git add .
          git commit -m "Daily contribution $(date)" || echo "No changes"

      - name: Push
        run: |
          git push
